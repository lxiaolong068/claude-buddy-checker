    <!--
      Anti-FOUC: runs synchronously before any CSS is applied.
      Restores theme (dark/light) and locale from localStorage so the
      first paint already has the correct styles — no flash of wrong theme.
      Default theme is "dark"; only suppress it when user explicitly chose "light".
    -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t !== 'light') document.documentElement.classList.add('dark');
        var l = localStorage.getItem('buddy-locale');
        if (l === 'zh') document.documentElement.lang = 'zh-CN';
        else if (l === 'ko') document.documentElement.lang = 'ko';
        else if (l === 'ja') document.documentElement.lang = 'ja';
      })();
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      Analytics: Umami (self-hosted).
      Set VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID in .env.production
      before building. The inline guard below prevents a console error when the
      variables have not been configured — the script simply will not load.
    -->
    <script>
      (function () {
        var ep = "%VITE_ANALYTICS_ENDPOINT%";
        var id = "%VITE_ANALYTICS_WEBSITE_ID%";
        // Only inject the script if both vars were actually replaced at build time
        if (ep && id && ep.indexOf('%') === -1 && id.indexOf('%') === -1) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = ep + '/umami';
          s.setAttribute('data-website-id', id);
          document.head.appendChild(s);
        }
      })();
    </script>
